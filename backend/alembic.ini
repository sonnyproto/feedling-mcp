# Alembic config for the Feedling backend schema.
#
# The database URL is NOT stored here — env.py reads it from the DATABASE_URL
# environment variable (same one the app/psycopg pool uses) and maps it to the
# psycopg3 SQLAlchemy dialect. So `alembic` CLI commands and the programmatic
# `db.init_schema()` (which runs `upgrade head`) both pick up the live DB.
#
# Common commands (run from backend/, with DATABASE_URL exported):
#   alembic upgrade head                 # apply all pending migrations
#   alembic revision -m "add X column"   # create a new (hand-written) migration
#   alembic current / history            # inspect state

[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
