# Alembic config for the TEE shadow (plaintext) Postgres schema (spec §4).
#
# This is an INDEPENDENT migration chain from backend/alembic.ini (the RDS
# ciphertext-envelope chain) — separate versions/ dir, separate version table
# (alembic_tee_version) so the two chains never collide in either database's
# alembic_version bookkeeping.
#
# The database URL is NOT stored here — env.py reads it from
# TEE_MIGRATION_DATABASE_URL (falling back to TEE_DATABASE_URL) and maps it to
# the psycopg3 SQLAlchemy dialect. `backend.alembic_tee.upgrade_head()`
# (invoked via `python -m backend.alembic_tee upgrade`, and by tests/conftest.py
# for the throwaway TEE test DB) always overrides script_location to this
# package's own directory, so this file works regardless of the caller's cwd.
#
# Common commands (run from repo root, with TEE_MIGRATION_DATABASE_URL exported):
#   python -m backend.alembic_tee upgrade    # apply all pending migrations

[alembic]
script_location = .
prepend_sys_path = .
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
