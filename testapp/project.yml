name: FeedlingTest

options:
  bundleIdPrefix: com.feedling.mcp
  deploymentTarget:
    iOS: "16.2"
  xcodeVersion: "15"
  groupOrdering:
    - order:
        - FeedlingTest
        - FeedlingBroadcast
        - FeedlingTestWidget
        - Shared

settings:
  DEVELOPMENT_TEAM: DC9JH5DRMY
  SWIFT_VERSION: "5.9"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"

schemes:
  FeedlingTest:
    build:
      targets:
        FeedlingTest: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:

  FeedlingTest:
    type: application
    platform: iOS
    bundleId: com.feedling.mcp
    deploymentTarget: "16.2"
    sources:
      - path: FeedlingTest
      - path: Shared
    entitlements:
      path: FeedlingTest/FeedlingTest.entitlements
      properties:
        aps-environment: development
        com.apple.security.application-groups:
          - group.com.feedling.mcp
    info:
      path: FeedlingTest/Info.plist
      properties:
        CFBundleDisplayName: IO
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        ITSAppUsesNonExemptEncryption: false
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
        NSMicrophoneUsageDescription: Feedling uses the microphone to enable voice input for search and commands.
        NSSpeechRecognitionUsageDescription: Feedling uses speech recognition to convert your voice into text for search and commands.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        CFBundleURLTypes:
          - CFBundleURLName: com.feedling.mcp
            CFBundleURLSchemes:
              - feedlingtest
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - remote-notification
        UIAppFonts:
          - Newsreader-VariableFont_opsz,wght.ttf
          - Newsreader-Italic-VariableFont_opsz,wght.ttf
          - NotoSerifSC-Regular.ttf
          - NotoSerifSC-Medium.ttf
          - DMMono-Regular.ttf
          - DMMono-Medium.ttf
          - InterTight-Regular.ttf
          - InterTight-Medium.ttf
    settings:
      DEVELOPMENT_TEAM: DC9JH5DRMY
      PRODUCT_BUNDLE_IDENTIFIER: com.feedling.mcp
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: FeedlingTestWidget
      - target: FeedlingBroadcast

  FeedlingBroadcast:
    type: app-extension
    platform: iOS
    bundleId: com.feedling.mcp.broadcast
    deploymentTarget: "16.2"
    sources:
      - path: FeedlingBroadcast
    entitlements:
      path: FeedlingBroadcast/FeedlingBroadcast.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.feedling.mcp
    info:
      path: FeedlingBroadcast/Info.plist
      properties:
        CFBundleDisplayName: IO
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.broadcast-services-upload
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).SampleHandler
          RPBroadcastProcessMode: RPBroadcastProcessModeSampleBuffer
    settings:
      DEVELOPMENT_TEAM: DC9JH5DRMY
      PRODUCT_BUNDLE_IDENTIFIER: com.feedling.mcp.broadcast

  FeedlingTestWidget:
    type: app-extension
    platform: iOS
    bundleId: com.feedling.mcp.widget
    deploymentTarget: "16.2"
    sources:
      - path: FeedlingTestWidget
      - path: Shared
    entitlements:
      path: FeedlingTestWidget/FeedlingTestWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.feedling.mcp
    info:
      path: FeedlingTestWidget/Info.plist
      properties:
        CFBundleDisplayName: IO Widget
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        UIAppFonts:
          - Newsreader-VariableFont_opsz,wght.ttf
          - Newsreader-Italic-VariableFont_opsz,wght.ttf
          - NotoSerifSC-Regular.ttf
          - NotoSerifSC-Medium.ttf
          - DMMono-Regular.ttf
          - DMMono-Medium.ttf
          - InterTight-Regular.ttf
          - InterTight-Medium.ttf
    settings:
      DEVELOPMENT_TEAM: DC9JH5DRMY
      PRODUCT_BUNDLE_IDENTIFIER: com.feedling.mcp.widget
