# Feedling — Phala TDX CVM compose (CVM-only, post-VPS migration).
#
# VPS is gone. This compose is the whole production stack:
#   - dstack-ingress: TLS termination for mcp.feedling.app + api.feedling.app
#   - backend:       Flask (HTTP+WS) — sole source of truth for user data
#   - mcp:           FastMCP SSE (plain HTTP behind ingress)
#   - enclave:       decrypt proxy + /attestation (own TLS on :5003,
#                    reachable via dstack-gateway `-5003s.` passthrough)
#
# IMPORTANT: this replaces the prior VPS+CVM split. DNS A-records for
# both `mcp.feedling.app` and `api.feedling.app` are migrated off
# the retired VPS host and onto Phala's dstack-gateway. Existing prod users
# re-onboard from scratch (per user direction 2026-04-21).
#
# REQUIRED CVM NODE: prod9 (dstack-pha-prod9). Multi-domain TXT routing
# via `_dstack-app-address.<domain>` only works on the prod9 gateway;
# prod5/prod7 do not support it. This is why we redeploy to a new CVM
# rather than updating the existing one on prod5 — new node → new
# app_id → new compose_hash authorization required.
#
# DNS records dstack-ingress manages automatically (needs CF token with
# Zone.DNS:Edit on feedling.app):
#   CNAME mcp.feedling.app → <app-id>.dstack-pha-prod9.phala.network
#   CNAME api.feedling.app → <app-id>.dstack-pha-prod9.phala.network
#   TXT   _dstack-app-address.mcp.feedling.app → <app-id>:443
#   TXT   _dstack-app-address.api.feedling.app → <app-id>:443
#   CAA   mcp.feedling.app / api.feedling.app pinned to Let's Encrypt
#
# Deploy flow:
#   1. `phala deploy -c deploy/docker-compose.phala.yaml -n feedling-enclave-v2 \
#         --node-id <prod9-node-id> -e CF_API_TOKEN=... -e CF_ZONE_ID=...`
#   2. Wait for ingress to issue LE certs (first-time boot ~2–3 min).
#   3. Update CF DNS: A records for mcp/api → the public IP printed by
#      `phala cvms get feedling-enclave-v2` (or the CNAME target above).
#   4. Compute compose_hash; publish on-chain via FeedlingAppAuth.addComposeHash.
#   5. iOS follow-up PR: update `AuditCardView.swift` `makeAttestationURL`
#      and `FeedlingAPI.swift` pinning URL to the new app_id on prod9.
#      Decide whether the MCP-port pubkey-pin row stays (now pins ingress
#      cert — requires enclave_app.py to bake ingress cert SPKI hash into
#      REPORT_DATA) or is retired (content-layer envelope crypto still
#      secures reads/writes regardless of transport-layer pinning).
#
# CRITICAL: every literal in this file becomes part of the compose_hash.
# Any ${VAR} below must be category (A) — cosmetic / non-security.
# See deploy/docker-compose.yaml for the full env-var hygiene rules.

name: feedling-enclave

services:
  # --- Public TLS termination for both custom domains (mcp + api). ---
  # HAProxy-based L4/L7 ingress inside the TDX CVM. Issues LE certs via
  # CF DNS-01, routes by SNI. Key material stays inside the enclave
  # volume `letsencrypt` — the CF token only has DNS-edit scope, not
  # certificate authority.
  ingress:
    image: dstacktee/dstack-ingress:2.2@sha256:d05a7b343c37c1cca1bba8dbf7e8f3c6d2118158af2d41c455103796db4f67f0
    restart: unless-stopped
    ports:
      - "443:443"
    environment:
      DNS_PROVIDER: "cloudflare"
      GATEWAY_DOMAIN: "_.dstack-pha-prod9.phala.network"
      SET_CAA: "true"
      CERTBOT_EMAIL: "security@feedling.app"
      # Multi-domain mode: one container, two SNI-routed upstreams.
      DOMAINS: |
        mcp.feedling.app
        api.feedling.app
      ROUTING_MAP: |
        mcp.feedling.app=mcp:5002
        api.feedling.app=backend:5001
      # CF_API_TOKEN must be injected via `phala deploy -e` (encrypted
      # env channel, NOT baked into compose_hash). Required scopes:
      # Zone.DNS:Edit on the feedling.app zone (for DNS-01 challenge +
      # TXT _dstack-app-address records + CAA pinning).
      CLOUDFLARE_API_TOKEN: "${CF_API_TOKEN}"
    volumes:
      # dstack-ingress 2.2 talks to the host's dstack daemon via tappd.sock
      # (older API socket). Key generation, quote derivation, and the
      # _dstack-app-address TXT record binding all go through this.
      - /var/run/tappd.sock:/var/run/tappd.sock
      - feedling_ingress_letsencrypt:/etc/letsencrypt
      - feedling_ingress_evidences:/evidences
    depends_on:
      backend:
        condition: service_started
      mcp:
        condition: service_started

  # --- Attestation service + decrypt proxy. ---
  # Keeps its own in-enclave TLS on :5003. NOT routed through ingress —
  # iOS reaches it via dstack-gateway passthrough at
  #   https://<app-id>-5003s.dstack-pha-prod9.phala.network/attestation
  # so the audit card can pin sha256(cert.DER) against the fingerprint
  # baked into REPORT_DATA. Moving this behind ingress would break the
  # Phase 3 pinning guarantee.
  enclave:
    image: ghcr.io/teleport-computer/feedling:d4995c3
    command: ["python", "-u", "backend/enclave_app.py"]
    restart: unless-stopped
    environment:
      FEEDLING_ENCLAVE_PORT: "5003"
      FEEDLING_DATA_DIR: "/data"
      FEEDLING_ENCLAVE_TLS: "true"
      FEEDLING_FLASK_URL: "http://backend:5001"
      # Post-prod9 migration: MCP terminates plain HTTP behind
      # dstack-ingress. The LE cert for mcp.feedling.app lives on the
      # ingress volume, NOT derived from dstack-KMS path
      # `feedling-mcp-tls-v1`, so the Phase C.2 pubkey fingerprint no
      # longer has a live counterpart. Leave empty → iOS renders the
      # "Pre-Phase-C.2 deployment" disclosure row (already supported).
      # Flip back to "true" only if restoring the MCP-in-enclave-TLS
      # mode (compose would also need to re-add ACME env + mount
      # /var/run/dstack.sock for the mcp service).
      FEEDLING_MCP_TLS_IN_ENCLAVE: "false"
      # NOTE: intentionally NOT setting DSTACK_SIMULATOR_ENDPOINT.
      # dstack-sdk treats "is this env var PRESENT?" as "use simulator"
      # even when the value is empty, so an empty string would make it
      # try to connect to "" and fail with EINVAL. Leaving the var unset
      # lets dstack-sdk fall through to /var/run/dstack.sock (mounted
      # below). Only set this on dev laptops running the simulator.
    ports:
      - "5003:5003"
    volumes:
      - feedling_enclave_data:/data
      - /var/run/dstack.sock:/var/run/dstack.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -k -s -o /dev/null -w '%{http_code}' https://127.0.0.1:5003/healthz | grep -qE '^(200|503)$'"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s

  # --- Flask backend — the ONLY backend. ---
  # Serves plain HTTP on :5001 (TLS terminated by ingress for
  # api.feedling.app). Also runs the WebSocket ingest on :9998 for the
  # iOS broadcast extension; that port is exposed via dstack-gateway
  # TLS-terminated route `wss://<app-id>-9998.dstack-pha-prod9...` —
  # frames are app-layer encrypted (FrameEnvelope v1) so gateway TLS
  # is sufficient for transport hygiene.
  backend:
    image: ghcr.io/teleport-computer/feedling:d4995c3
    command: ["python", "-u", "backend/app.py"]
    restart: unless-stopped
    environment:
      FEEDLING_API_KEY: ""
      FEEDLING_DATA_DIR: "/data"
      FEEDLING_WS_PORT: "9998"
      FEEDLING_ENCLAVE_URL: "https://enclave:5003"
      # APNs developer key for push (Dynamic Island / Live Activity).
      # Injected via `phala deploy -e APNS_KEY_P8_B64=...` (encrypted env
      # channel, NOT baked into compose_hash). Empty default keeps dev
      # deploys + CI compose-build healthy — code falls through to
      # "logged_only" mode when unset. KEY_ID + TEAM_ID are also overridable
      # but default to the Apple dev team's ids in backend/app.py.
      APNS_KEY_P8_B64: "${APNS_KEY_P8_B64:-}"
      APNS_KEY_ID: "${APNS_KEY_ID:-}"
      APNS_TEAM_ID: "${APNS_TEAM_ID:-}"
      # Optional LLM Gate for proactive screen outreach. If unset, automatic
      # Gate records model_not_configured and does not enqueue hidden jobs.
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      FEEDLING_PROACTIVE_GATE_PROVIDER: "${FEEDLING_PROACTIVE_GATE_PROVIDER:-openrouter}"
      FEEDLING_PROACTIVE_GATE_MODEL: "${FEEDLING_PROACTIVE_GATE_MODEL:-google/gemini-3.1-flash-lite}"
    ports:
      - "5001:5001"
      - "9998:9998"
    volumes:
      - feedling_backend_data:/data
    depends_on:
      enclave:
        condition: service_healthy

  # --- MCP SSE server (plain HTTP behind ingress). ---
  # TLS termination moved to the ingress service; MCP speaks HTTP only.
  # Consequence: the Phase C.2 MCP-port pubkey-pin (derived from
  # dstack-KMS at path `feedling-mcp-tls-v1`) is no longer in this path.
  # Ingress owns the LE cert for mcp.feedling.app. iOS audit card either
  # (a) drops the MCP-TLS pin row, or (b) pins the ingress cert SPKI via
  # a new attested fingerprint. See header TODO.
  mcp:
    image: ghcr.io/teleport-computer/feedling:d4995c3
    command: ["python", "-u", "backend/mcp_server.py"]
    restart: unless-stopped
    environment:
      FEEDLING_API_KEY: ""
      FEEDLING_FLASK_URL: "http://backend:5001"
      FEEDLING_ENCLAVE_URL: "https://enclave:5003"
      FEEDLING_MCP_PORT: "5002"
      FEEDLING_MCP_TRANSPORT: "sse"
      # Plain HTTP — ingress terminates TLS.
      FEEDLING_MCP_TLS: "false"
    depends_on:
      backend:
        condition: service_started

volumes:
  feedling_enclave_data:
    name: feedling_enclave_data
  feedling_backend_data:
    name: feedling_backend_data
  feedling_ingress_letsencrypt:
    name: feedling_ingress_letsencrypt
  feedling_ingress_evidences:
    name: feedling_ingress_evidences
