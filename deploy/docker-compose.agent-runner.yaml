# agent-runner — the 4th Phala service (plan §Runtime 拓扑).
#
# ⚠️ SUPERSEDED for prod/test deploys: the `agent-runner` service + the
# `feedling_agent_runtime` volume are now defined INLINE in
# deploy/docker-compose.phala.yaml and deploy/docker-compose.phala.test.yaml
# (folded in so CI builds + deploys them; the image tag is pinned by the same CI
# step that pins the backend). Those inline definitions are the source of truth —
# edit them, not this file. This overlay is kept ONLY as a local-dev convenience
# for running the agent-runner against a non-phala compose; it is NOT used by CI.
#
# Local dev (against the plain dev compose, NOT the phala ones which already carry
# the service):
#   docker compose -f deploy/docker-compose.yaml \
#     -f deploy/docker-compose.agent-runner.yaml up
#
# The agent-runner image is built from deploy/Dockerfile.agent-runner (publish
# to ghcr.io/teleport-computer/feedling-agent-runner:<digest>).

name: feedling-enclave

services:
  agent-runner:
    image: ghcr.io/teleport-computer/feedling-agent-runner:dev
    command: ["python", "-u", "backend/agent_runtime/supervisor.py"]
    restart: unless-stopped
    environment:
      FEEDLING_API_URL: "http://backend:5001"
      FEEDLING_ENCLAVE_URL: "https://enclave:5003"
      AGENT_DATA_ROOT: "/agent-data"
      AGENT_LEASE_TTL_SEC: "60"
      AGENT_TICK_INTERVAL_SEC: "15"
      # Isolation strategy: process (default, v1) | container (opt-in strong
      # isolation — see docs/AGENT_RUNTIME_ISOLATION.md; not fully wired).
      AGENT_RUNTIME_ISOLATION: "process"
      # Lease table (same external Postgres as the backend). Encrypted env
      # channel — carries DB creds, must include sslmode=require.
      DATABASE_URL: "${DATABASE_URL:-}"
      # Stage-D runtime token signing secret — mints short-lived per-user tokens.
      # Encrypted env channel; NOT baked. (Var name must match what supervisor.py
      # reads: FEEDLING_RUNTIME_TOKEN_SECRET.)
      FEEDLING_RUNTIME_TOKEN_SECRET: "${FEEDLING_RUNTIME_TOKEN_SECRET:-}"
      # Roster of users to service (JSON: [{"api_key":...,"provider_key":...}]).
      # Encrypted env channel — carries per-user keys, never baked into the hash.
      AGENT_RUNTIME_USERS: "${AGENT_RUNTIME_USERS:-}"
      AGENT_RUNTIME_AUTODISCOVER: "${AGENT_RUNTIME_AUTODISCOVER:-}"
    volumes:
      - feedling_agent_runtime:/agent-data
    depends_on:
      backend:
        condition: service_started
      enclave:
        condition: service_healthy

volumes:
  feedling_agent_runtime:
    name: feedling_agent_runtime
