# Feedling docker-compose — Flask backend + FastMCP SSE server.
#
# Quick start:
#   cp deploy/feedling.env.example deploy/.env     # edit the important bits
#   docker compose -f deploy/docker-compose.yaml --env-file deploy/.env up -d --build
#
# Ports published:
#   5001  — Flask HTTP API (iOS app + HTTP-skill agents)
#   5002  — FastMCP SSE (Claude.ai / MCP clients)
#   9998  — WebSocket frame ingest (iOS broadcast extension)
#
# Data persists under the named volume `feedling_data` (maps to /data in the
# containers). Drop the APNs .p8 key into that volume to enable push; without
# it, push endpoints log-only.
#
# TLS is intentionally NOT handled here. Run Caddy on the host (see
# deploy/Caddyfile) so TLS config stays independent of container restarts.
#
# dstack readiness (see docs/DESIGN_E2E.md):
#   When the E2E phase ships, the `mcp` service here gets replaced by a
#   dstack-deployed CVM. This compose file will continue to run the `backend`
#   service on the non-TEE host. No rewrite; the mcp block just moves out.
#
# -----------------------------------------------------------------------------
# § ENV-VAR HYGIENE AUDIT (see docs/DESIGN_E2E.md §7.2, §12.11)
# -----------------------------------------------------------------------------
# The compose_hash we publish on-chain via FeedlingAppAuth is SHA-256 of this
# literal file. Any ${VAR}-interpolated value changes what runs without
# changing the hash — which is exactly the "operator can redirect data" rug
# vector is-this-real-tea flags. So every ${VAR} below must fall into one of
# three categories:
#
#   (A) NOT security-relevant — purely timing / volume / cosmetic; operator
#       can tune without changing trust posture. Documented per-var.
#   (B) Baked-in literal — see below; no ${VAR}.
#   (C) Derived at runtime from dstack-attested primitives (future, not
#       present in this file yet — Phase 2+).
#
# Anything that would fit under "(A) security-relevant: yes, keep mutable"
# is NOT allowed and would fail the iOS audit card.
#
# Current audit:
#   FEEDLING_API_KEY                — BAKED empty. The backend never accepts
#                                     unauthenticated requests; per-user
#                                     api_keys come from POST /v1/users/register.
#                                     If you want MCP to talk to the backend
#                                     in dev without registering, set a shared
#                                     key via your own override file and publish
#                                     its compose_hash.
#   FEEDLING_MCP_TRANSPORT          — BAKED to sse. No silent downgrade.
#   FEEDLING_FLASK_URL              — BAKED to the compose-internal DNS name.
#                                     Operator can't redirect to a snooping
#                                     Flask.
#   FEEDLING_DATA_DIR               — BAKED to /data; matches the named
#                                     volume mount. Operator can't relocate.
#   FEEDLING_WS_PORT                — BAKED to 9998; matches port publish.
#   FEEDLING_PUSH_COOLDOWN_SEC      — Category (A) — cosmetic rate-limit,
#                                     tunable via ${}.
#   FEEDLING_LIVE_ACTIVITY_DEDUPE_SEC — Category (A) — cosmetic dedupe window.
#   FEEDLING_PUBLIC_BASE_URL        — Category (A) — cosmetic; only affects
#                                     how frame URLs are rendered back to
#                                     clients. Plaintext frame URLs are
#                                     authed-only anyway.

name: feedling

services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: feedling-backend:dev
    # gunicorn = production WSGI. -w 1 is mandatory: app.py binds the :9998
    # WebSocket ingest at import time, so multiple workers collide on it.
    command: ["gunicorn", "--chdir", "backend", "-w", "1", "--threads", "16", "--timeout", "120", "-b", "0.0.0.0:5001", "app:app"]
    restart: unless-stopped
    environment:
      # --- BAKED: security-relevant, audited by iOS ---
      FEEDLING_API_KEY: ""
      FEEDLING_DATA_DIR: "/data"
      FEEDLING_WS_PORT: "9998"
      # --- MUTABLE: category (A), not security-relevant ---
      FEEDLING_PUBLIC_BASE_URL: "${FEEDLING_PUBLIC_BASE_URL:-}"
      FEEDLING_PUSH_COOLDOWN_SEC: "${FEEDLING_PUSH_COOLDOWN_SEC:-300}"
      FEEDLING_LIVE_ACTIVITY_DEDUPE_SEC: "${FEEDLING_LIVE_ACTIVITY_DEDUPE_SEC:-900}"
    ports:
      - "5001:5001"
      - "9998:9998"
    volumes:
      - feedling_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://127.0.0.1:5001/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  mcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: feedling-mcp:dev
    command: ["python", "-u", "backend/mcp_server.py"]
    restart: unless-stopped
    environment:
      # --- BAKED: security-relevant ---
      FEEDLING_API_KEY: ""
      FEEDLING_FLASK_URL: "http://backend:5001"
      FEEDLING_MCP_PORT: "5002"
      FEEDLING_MCP_TRANSPORT: "sse"
    ports:
      - "5002:5002"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  feedling_data:
    name: feedling_data
