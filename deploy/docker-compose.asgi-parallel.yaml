# Dev-only parallel ASGI backend instance (ASGI-migration plan §8 / §5.2).
#
# Runs the SAME image as `backend` but with the FastAPI/ASGI entrypoint
# (asgi_app:app) on :5005, so you can validate native routes against a real
# Postgres over HTTP WITHOUT touching the live Flask backend on :5001. It is
# NOT on ingress and carries no production traffic — it is a scratch instance
# for internal soak during the migration window. Delete it at cutover, when the
# main `backend` command is switched to §5.2's single ASGI form.
#
# Layer it on top of the base compose:
#   docker compose -f deploy/docker-compose.yaml \
#                  -f deploy/docker-compose.asgi-parallel.yaml up backend-asgi
#
# Standalone equivalent (the exact prod cutover command, on :5001, for reference):
#   gunicorn --chdir backend --config backend/gunicorn_conf.py \
#            -k asgi.worker.FeedlingUvicornWorker --timeout 120 \
#            -b 0.0.0.0:5001 asgi_app:app
#
# NOTE (macOS local dev only): gunicorn forks workers, and on macOS forking a
# process that initialised certain C extensions (psycopg/libpq, ssl, objc)
# pre-fork SIGSEGVs the uvicorn worker during "application startup". This does
# NOT happen on the Linux CVM. For a quick local check without Docker, run
# uvicorn directly (no fork):
#   DATABASE_URL=... FEEDLING_LITELLM_ENABLE=1 FEEDLING_HOST_ALL=1 \
#   FEEDLING_RUNTIME_TOKEN_SECRET=x \
#   python3 -m uvicorn --app-dir backend asgi_app:app --host 127.0.0.1 --port 5005
# (uvicorn-direct skips gunicorn on_starting, so run `db.init_schema()` yourself
#  if the schema isn't applied; /healthz needs no schema.)

services:
  backend-asgi:
    image: feedling-backend:dev
    # -k UvicornWorker + asgi_app:app is the only difference from `backend`.
    # No `-w` on the CLI: worker count comes from FEEDLING_BACKEND_WORKERS via
    # gunicorn_conf.py (default 1). --config is REQUIRED — on_starting runs the
    # hosting-ready check AND db.init_schema() (the ASGI schema single-point).
    command: ["gunicorn", "--chdir", "backend", "--config", "backend/gunicorn_conf.py", "-k", "asgi.worker.FeedlingUvicornWorker", "--timeout", "120", "-b", "0.0.0.0:5005", "asgi_app:app"]
    restart: unless-stopped
    environment:
      FEEDLING_API_KEY: ""
      FEEDLING_DATA_DIR: "/data"
      # Shares the live backend's DB (same schema; expand-only during the window).
      DATABASE_URL: "${DATABASE_URL:-}"
      FEEDLING_PUBLIC_BASE_URL: "${FEEDLING_PUBLIC_BASE_URL:-}"
      # 托管三件套（缺一即 on_starting fail-fast，与主 backend 一致）
      FEEDLING_LITELLM_ENABLE: "${FEEDLING_LITELLM_ENABLE:-}"
      FEEDLING_HOST_ALL: "${FEEDLING_HOST_ALL:-}"
      FEEDLING_RUNTIME_TOKEN_SECRET: "${FEEDLING_RUNTIME_TOKEN_SECRET:-}"
      # ASGI capacity knobs (plan §5.4) — defaults are fine for validation.
      FEEDLING_ASGI_DB_THREADS: "${FEEDLING_ASGI_DB_THREADS:-64}"
      # Background services (wake-bus LISTEN + :9998 WS leader) stay OFF here so
      # this scratch instance does not contend with the live backend for WS
      # leadership / spawn duplicate listeners against the shared DB (plan §8.1).
      # Flip to 1 only when this instance IS the backend (cutover).
      FEEDLING_ASGI_BACKGROUND: "${FEEDLING_ASGI_BACKGROUND:-0}"
    ports:
      # :5005 only — deliberately NOT :5001 (no ingress) and NOT :9998 (no WS).
      - "5005:5005"
    volumes:
      - feedling_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://127.0.0.1:5005/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
