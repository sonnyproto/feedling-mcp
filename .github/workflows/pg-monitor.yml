# .github/workflows/pg-monitor.yml — 没有监控 = 没有备份（spec §3）
# 监控 **prod** TEE Postgres 的 WAL-G 备份链（归档新鲜度 + WAL 堆积 + R2 落地）。
# prod 才是真正要盯的：真实用户数据。test 库数据可弃，故不监控。
name: PG backup monitor
on:
  schedule: [{ cron: '*/30 * * * *' }]
  workflow_dispatch: {}
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Install psql 17 (direct TLS 需要 libpq>=17)
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client-17
      - name: Archiver freshness + WAL 堆积（monitoring 角色，pg_monitor-only）
        env:
          MON_DSN: ${{ secrets.PROD_PG_MONITORING_DSN }}   # host=<prod-pg-app-id>-5432s... port=443 user=monitoring dbname=feedling sslnegotiation=direct sslmode=require
        run: |
          PSQL=/usr/lib/postgresql/17/bin/psql
          AGE=$($PSQL "$MON_DSN" -tAc "SELECT COALESCE(EXTRACT(EPOCH FROM now()-last_archived_time)::int, 999999) FROM pg_stat_archiver;")
          echo "archiver age: ${AGE}s"
          test "$AGE" -lt 3600 || { echo "::error::archiver stale ${AGE}s (>1h) — 归档死了"; exit 1; }
          WAL_MB=$($PSQL "$MON_DSN" -tAc "SELECT COALESCE(sum(size)/1024/1024,0)::int FROM pg_ls_waldir();")
          echo "pg_wal size: ${WAL_MB}MB"
          test "$WAL_MB" -lt 4096 || { echo "::error::WAL 堆积 ${WAL_MB}MB (>4GB) — 先修归档，绝不手删 pg_wal/"; exit 1; }
      - name: R2 bucket freshness
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.PROD_PG_BACKUP_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PROD_PG_BACKUP_R2_SECRET_ACCESS_KEY }}
          # GitHub runner has no default AWS region; `aws s3api` still demands
          # one even with --endpoint-url pointed at R2 (which ignores the
          # value but the CLI errors out client-side without it).
          AWS_DEFAULT_REGION: auto
          AWS_REGION: auto
          ENDPOINT: ${{ secrets.PROD_PG_BACKUP_R2_ENDPOINT }}
        run: |
          # aws CLI 会自动分页：一个前缀 >1000 对象时，每页各输出一个「本页最新」
          # 时间戳，newest() 于是吐出多行，下游 fromisoformat 直接炸（2026-07-14 prod
          # 实测：wal_005/ 已 >1000 个 WAL 对象）。用 sort|tail 取跨页全局最新——对象
          # key 按字典序≈时间序、ISO 时间戳字典序也=时间序，故排序末行即最新。空前缀
          # aws 返回单行 "None"，经 sort|tail 仍是 "None"，check_age 照常当 EMPTY 处理。
          # 注意：不能用 --no-paginate（只取第一页=最旧的 key → 反而误报 stale）。
          newest() { aws s3api list-objects-v2 --endpoint-url "$ENDPOINT" \
            --bucket io-in-enclave-db --prefix "$1" \
            --query 'sort_by(Contents,&LastModified)[-1].LastModified' --output text \
            | sort | tail -n1; }
          WAL_TS=$(newest "prod/wal-g/wal_005/")
          BASE_TS=$(newest "prod/wal-g/basebackups_005/")
          echo "newest wal: $WAL_TS | newest base sentinel: $BASE_TS"

          check_age() {
            # $1=label $2=timestamp $3=max_age_seconds $4=empty_error_message
            local label="$1" ts="$2" max="$3" empty_msg="$4"
            local age rc
            # && rc=0 || rc=$? 防 GHA 默认 bash -e 在赋值失败时直接终止、吞掉下面的诊断分支
            age=$(python3 -c "import sys, datetime as dt; s = sys.argv[1].strip(); sys.exit(3) if (not s or s == 'None') else None; s = s[:-1] + '+00:00' if s.endswith('Z') else s; d = dt.datetime.fromisoformat(s); d = d.replace(tzinfo=dt.timezone.utc) if d.tzinfo is None else d; print(int((dt.datetime.now(dt.timezone.utc) - d).total_seconds()))" "$ts") && rc=0 || rc=$?
            case $rc in
              3) echo "::error::${label} prefix EMPTY — ${empty_msg}"; exit 1 ;;
              0) : ;;
              *) echo "::error::${label} timestamp parse failed: '${ts}'"; exit 1 ;;
            esac
            echo "${label} age: ${age}s"
            test "$age" -lt "$max" || { echo "::error::${label} stale ${age}s (>${max}s)"; exit 1; }
          }

          check_age "WAL" "$WAL_TS" 3600 "wal_005 无最新 WAL — 归档未同步到 R2"
          check_age "BASE" "$BASE_TS" 93600 "WAL 无 base backup 不可恢复"
