name: Agentic API-key qualification (manual)

on:
  workflow_dispatch:
    inputs:
      expected_deployment_sha:
        description: Full backend/worker Git SHA deployed to the Feedling test environment
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: feedling-test-environment
  cancel-in-progress: false

jobs:
  validate-dispatch:
    name: require the test branch
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Reject qualification from any non-test ref
        env:
          DISPATCH_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [ "$DISPATCH_REF" != "refs/heads/test" ]; then
            echo "::error::qualification must be dispatched from refs/heads/test; got $DISPATCH_REF"
            exit 1
          fi

  qualify-api-key-runtime-v2:
    name: qualify eight API-key profiles
    needs: validate-dispatch
    environment: feedling-e2e-test
    runs-on: [self-hosted, linux, x64, feedling-e2e]
    timeout-minutes: 240

    steps:
      - name: Check out exact workflow revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: qa/requirements.lock

      - name: Install hash-locked qualification dependencies
        run: python -m pip install --require-hashes -r qa/requirements.lock

      - name: Verify Codex authoring schema projection
        run: python qa/codex_output_schema.py --check

      - name: Prepare isolated run directories
        id: context
        env:
          INPUT_EXPECTED_SHA: ${{ inputs.expected_deployment_sha }}
        run: |
          set -euo pipefail
          if [[ ! "$INPUT_EXPECTED_SHA" =~ ^([0-9a-fA-F]{40}|[0-9a-fA-F]{64})$ ]]; then
            echo "::error::expected_deployment_sha must be a full 40- or 64-character hexadecimal Git SHA"
            exit 1
          fi

          run_id="api-key-e2e-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          private_root="${RUNNER_TEMP}/${run_id}-private"
          artifact_dir="${GITHUB_WORKSPACE}/qualification-artifacts/${run_id}"
          manifest="${private_root}/profiles.json"
          profile_manifest_dir="${private_root}/profile-manifests"
          worker_root="${private_root}/workers"
          worker_output_root="${private_root}/worker-raw"
          aggregation_input_root="${private_root}/aggregation-inputs"
          supervisor_home="${private_root}/supervisor-home"
          supervisor_tmp="${private_root}/supervisor-tmp"
          supervisor_work="${private_root}/supervisor-work"
          codex_home="${private_root}/codex-home"
          orchestration_receipt="${private_root}/orchestration-receipt.json"
          private_result="${private_root}/agent-run-result.json"
          pre_deployment_receipt="${private_root}/deployment-receipt-pre.json"
          post_deployment_receipt="${private_root}/deployment-receipt-post.json"

          umask 077
          mkdir -m 700 "$private_root"
          mkdir -m 700 \
            "${private_root}/raw-codex" \
            "$profile_manifest_dir" \
            "$worker_root" \
            "$worker_output_root" \
            "$aggregation_input_root" \
            "$supervisor_home" \
            "$supervisor_tmp" \
            "$supervisor_work" \
            "$codex_home"
          for agent_type in \
            profile_official_deepseek \
            profile_official_anthropic \
            profile_official_openai \
            profile_official_gemini \
            profile_openrouter_claude \
            profile_openrouter_openai \
            profile_openrouter_glm \
            profile_relay_kongbeiqie
          do
            mkdir -m 700 "${worker_root}/${agent_type}"
            mkdir -m 700 \
              "${worker_root}/${agent_type}/home" \
              "${worker_root}/${agent_type}/tmp" \
              "${worker_root}/${agent_type}/work"
          done
          mkdir -m 700 "$artifact_dir"

          {
            echo "run_id=$run_id"
            echo "private_root=$private_root"
            echo "manifest=$manifest"
            echo "profile_manifest_dir=$profile_manifest_dir"
            echo "worker_root=$worker_root"
            echo "worker_output_root=$worker_output_root"
            echo "aggregation_input_root=$aggregation_input_root"
            echo "supervisor_home=$supervisor_home"
            echo "supervisor_tmp=$supervisor_tmp"
            echo "supervisor_work=$supervisor_work"
            echo "codex_home=$codex_home"
            echo "orchestration_receipt=$orchestration_receipt"
            echo "private_result=$private_result"
            echo "pre_deployment_receipt=$pre_deployment_receipt"
            echo "post_deployment_receipt=$post_deployment_receipt"
            echo "artifact_dir=$artifact_dir"
            echo "expected_sha=${INPUT_EXPECTED_SHA,,}"
          } >> "$GITHUB_OUTPUT"

      - name: Verify deployed backend and worker build identity before qualification
        id: deployment_pre
        env:
          QA_FEEDLING_BASE_URL: https://test-api.feedling.app
          QA_TEST_ADMIN_TOKEN: ${{ secrets.QA_TEST_ADMIN_TOKEN }}
          QA_EXPECTED_DEPLOYMENT_SHA: ${{ steps.context.outputs.expected_sha }}
        run: |
          set -euo pipefail
          umask 077
          python qa/verify_deployment.py \
            --expected-sha "$QA_EXPECTED_DEPLOYMENT_SHA" \
            --receipt "${{ steps.context.outputs.pre_deployment_receipt }}"

      - name: Install and verify isolated headless Codex runtime
        id: codex_preflight
        env:
          QA_PRIVATE_ROOT: ${{ steps.context.outputs.private_root }}
          QA_ARTIFACT_DIR: ${{ steps.context.outputs.artifact_dir }}
          QA_MANIFEST: ${{ steps.context.outputs.manifest }}
          QA_PROFILE_MANIFEST_DIR: ${{ steps.context.outputs.profile_manifest_dir }}
          QA_WORKER_ROOT: ${{ steps.context.outputs.worker_root }}
          QA_WORKER_OUTPUT_ROOT: ${{ steps.context.outputs.worker_output_root }}
          QA_AGGREGATION_INPUT_ROOT: ${{ steps.context.outputs.aggregation_input_root }}
          QA_SUPERVISOR_HOME: ${{ steps.context.outputs.supervisor_home }}
          QA_SUPERVISOR_TMP: ${{ steps.context.outputs.supervisor_tmp }}
          QA_SUPERVISOR_WORK: ${{ steps.context.outputs.supervisor_work }}
          QA_CODEX_HOME: ${{ steps.context.outputs.codex_home }}
          QA_ORCHESTRATION_RECEIPT: ${{ steps.context.outputs.orchestration_receipt }}
          QA_CODEX_MODEL: ${{ vars.QA_CODEX_MODEL }}
          QA_CODEX_AUTH_JSON_B64: ${{ secrets.QA_CODEX_AUTH_JSON_B64 }}
        run: |
          set -euo pipefail
          umask 077
          codex_bin="$(command -v codex || true)"
          if [ -z "$codex_bin" ] || [ ! -x "$codex_bin" ]; then
            echo "::error::Codex CLI is not installed on the trusted E2E runner"
            exit 1
          fi
          if [ -f "$HOME/.codex/auth.json" ]; then
            echo "::error::persistent Codex auth is forbidden on the E2E runner"
            exit 1
          fi
          if [ "$(id -u)" -eq 0 ]; then
            echo "::error::the trusted E2E runner must run as an unprivileged user"
            exit 1
          fi
          if [ "$($codex_bin --version)" != "codex-cli 0.144.3" ]; then
            echo "::error::trusted E2E runner must pin codex-cli 0.144.3"
            exit 1
          fi
          if [ -z "$QA_CODEX_AUTH_JSON_B64" ]; then
            echo "::error::QA_CODEX_AUTH_JSON_B64 is required"
            exit 1
          fi
          if [ -z "$QA_CODEX_MODEL" ]; then
            echo "::error::QA_CODEX_MODEL is required"
            exit 1
          fi

          printf '%s' "$QA_CODEX_AUTH_JSON_B64" | \
            python qa/install_codex_auth.py --codex-home "$QA_CODEX_HOME"
          unset QA_CODEX_AUTH_JSON_B64

          python_prefix="$(python -c 'import pathlib, sys; print(pathlib.Path(sys.prefix).resolve())')"
          python_base_prefix="$(python -c 'import pathlib, sys; print(pathlib.Path(sys.base_prefix).resolve())')"
          python qa/write_codex_config.py \
            --output "$QA_CODEX_HOME/config.toml" \
            --source-root "$GITHUB_WORKSPACE" \
            --artifact-root "$QA_ARTIFACT_DIR" \
            --full-manifest "$QA_MANIFEST" \
            --profile-manifest-dir "$QA_PROFILE_MANIFEST_DIR" \
            --supervisor-home "$QA_SUPERVISOR_HOME" \
            --supervisor-tmp "$QA_SUPERVISOR_TMP" \
            --supervisor-work "$QA_SUPERVISOR_WORK" \
            --worker-root "$QA_WORKER_ROOT" \
            --worker-output-root "$QA_WORKER_OUTPUT_ROOT" \
            --aggregation-input-root "$QA_AGGREGATION_INPUT_ROOT" \
            --orchestration-receipt "$QA_ORCHESTRATION_RECEIPT" \
            --codex-model "$QA_CODEX_MODEL" \
            --allowed-host test-api.feedling.app \
            --runtime-read-root "$python_prefix" \
            --runtime-read-root "$python_base_prefix"

          env -i \
            HOME="$QA_SUPERVISOR_HOME" \
            PATH="$PATH" \
            CODEX_HOME="$QA_CODEX_HOME" \
            LANG="C.UTF-8" \
            TMPDIR="$QA_SUPERVISOR_TMP" \
            "$codex_bin" login status > "${QA_PRIVATE_ROOT}/codex-login-status.txt"
          "$codex_bin" exec --help > "${QA_PRIVATE_ROOT}/codex-exec-help.txt"
          "$codex_bin" sandbox --help > "${QA_PRIVATE_ROOT}/codex-sandbox-help.txt"
          grep -q -- "--output-schema" "${QA_PRIVATE_ROOT}/codex-exec-help.txt"
          grep -q -- "--strict-config" "${QA_PRIVATE_ROOT}/codex-exec-help.txt"
          grep -q -- "--permission-profile" "${QA_PRIVATE_ROOT}/codex-sandbox-help.txt"

          mcp_servers="$(cd "$QA_SUPERVISOR_WORK" && env -i \
            HOME="$QA_SUPERVISOR_HOME" \
            PATH="$PATH" \
            CODEX_HOME="$QA_CODEX_HOME" \
            "$codex_bin" mcp list --json)"
          MCP_SERVERS="$mcp_servers" python - <<'PY'
          import json
          import os

          if json.loads(os.environ["MCP_SERVERS"]) != []:
              raise SystemExit("unexpected MCP server configured for qualification")
          PY

          # Deterministic sandbox probes validate the actual permission profile.
          worker_tmp="${QA_WORKER_ROOT}/profile_official_deepseek/tmp"
          worker_work="${QA_WORKER_ROOT}/profile_official_deepseek/work"
          env -i \
            HOME="${QA_WORKER_ROOT}/profile_official_deepseek/home" \
            PATH="$PATH" \
            CODEX_HOME="$QA_CODEX_HOME" \
            LANG="C.UTF-8" \
            TMPDIR="$worker_tmp" \
            "$codex_bin" sandbox -P feedling-e2e-official-deepseek \
              --include-managed-config -C "$worker_work" -- \
              /bin/sh -eu -c '
                test -r "$1"
                printf "tmp\n" > "$2"
                rm -f "$2"
                printf "work\n" > "$3"
                rm -f "$3"
                for denied in "$4" "$5" "$6" "$7" "$8"; do
                  test ! -r "$denied"
                done
                if printf "forbidden\n" > "$9" 2>/dev/null; then
                  rm -f "$9"
                  exit 1
                fi
              ' sh \
              "$GITHUB_WORKSPACE/qa/SOP.md" \
              "${worker_tmp}/.preflight" \
              "${worker_work}/.preflight" \
              "$QA_MANIFEST" \
              "$QA_WORKER_OUTPUT_ROOT" \
              "$QA_AGGREGATION_INPUT_ROOT" \
              "$QA_ORCHESTRATION_RECEIPT" \
              "$QA_SUPERVISOR_HOME" \
              "$QA_ARTIFACT_DIR/.sandbox-write-must-fail"

          env -i \
            HOME="${QA_WORKER_ROOT}/profile_official_deepseek/home" \
            PATH="$PATH" \
            CODEX_HOME="$QA_CODEX_HOME" \
            LANG="C.UTF-8" \
            TMPDIR="$worker_tmp" \
            "$codex_bin" sandbox -P feedling-e2e-official-deepseek \
              --include-managed-config -C "$worker_work" -- \
              /bin/sh -eu -c '
                curl --silent --show-error --proto "=https" --max-redirs 0 \
                  --connect-timeout 10 --max-time 20 --output /dev/null \
                  https://test-api.feedling.app/
                if curl --fail --silent --show-error --proto "=https" \
                  --max-redirs 0 --connect-timeout 5 --max-time 10 \
                  --output /dev/null https://example.com/; then
                  exit 1
                fi
                if curl --noproxy "*" --insecure --fail --silent --show-error \
                  --proto "=https" --max-redirs 0 --connect-timeout 5 --max-time 10 \
                  --output /dev/null https://1.1.1.1/; then
                  exit 1
                fi
              '

          # One real top-level profile run proves OAuth, strict config, profile
          # selection, and Structured Outputs before provider keys are touched.
          preflight_schema="${QA_PRIVATE_ROOT}/preflight-schema.json"
          preflight_result="${QA_PRIVATE_ROOT}/preflight-result.json"
          preflight_events="${QA_PRIVATE_ROOT}/raw-codex/preflight-events.jsonl"
          preflight_stderr="${QA_PRIVATE_ROOT}/raw-codex/preflight-stderr.log"
          python - <<'PY' "$preflight_schema"
          import json
          import os
          import sys

          schema = {
              "type": "object",
              "additionalProperties": False,
              "required": ["ok", "profile_id"],
              "properties": {
                  "ok": {"type": "boolean", "enum": [True]},
                  "profile_id": {"type": "string", "enum": ["official-deepseek"]},
              },
          }
          path = sys.argv[1]
          descriptor = os.open(path, os.O_WRONLY | os.O_CREAT | os.O_EXCL, 0o600)
          with os.fdopen(descriptor, "w", encoding="utf-8") as handle:
              json.dump(schema, handle, separators=(",", ":"))
              handle.write("\n")
          PY
          env -i \
            HOME="${QA_WORKER_ROOT}/profile_official_deepseek/home" \
            PATH="$PATH" \
            CODEX_HOME="$QA_CODEX_HOME" \
            LANG="C.UTF-8" \
            TMPDIR="$worker_tmp" \
            "$codex_bin" exec \
              -p profile_official_deepseek \
              -c 'default_permissions="feedling-e2e-official-deepseek"' \
              --ignore-rules \
              --strict-config \
              --skip-git-repo-check \
              --cd "$worker_work" \
              --output-schema "$preflight_schema" \
              --output-last-message "$preflight_result" \
              --color never \
              --json \
              'Return only {"ok":true,"profile_id":"official-deepseek"}. Do not call any tool.' \
              > "$preflight_events" 2> "$preflight_stderr"
          python - <<'PY' "$preflight_result" "$preflight_events"
          import json
          import sys
          from pathlib import Path

          from qa.verify_codex_orchestration import parse_exec_events

          result_path, events_path = map(Path, sys.argv[1:])
          if json.loads(result_path.read_text()) != {
              "ok": True,
              "profile_id": "official-deepseek",
          }:
              raise SystemExit("Codex profile preflight returned the wrong result")
          parse_exec_events(events_path)
          PY
          for root in \
            "${QA_WORKER_ROOT}/profile_official_deepseek/home" \
            "${QA_WORKER_ROOT}/profile_official_deepseek/tmp" \
            "${QA_WORKER_ROOT}/profile_official_deepseek/work"
          do
            if [ -n "$(find "$root" -mindepth 1 -maxdepth 1 -print -quit)" ]; then
              echo "::error::Codex preflight polluted an isolated worker root"
              exit 1
            fi
          done

          {
            echo "codex_bin=$codex_bin"
            echo "codex_auth=${QA_CODEX_HOME}/auth.json"
          } >> "$GITHUB_OUTPUT"

      # This is the only setup step that receives provider credentials. No
      # provider or admin credential is ever passed to a Codex process.
      - name: Provision eight isolated API-key profiles
        id: provision
        env:
          QA_FEEDLING_BASE_URL: https://test-api.feedling.app
          QA_RUN_ID: ${{ steps.context.outputs.run_id }}
          QA_TEST_ADMIN_TOKEN: ${{ secrets.QA_TEST_ADMIN_TOKEN }}
          QA_DEEPSEEK_API_KEY: ${{ secrets.QA_DEEPSEEK_API_KEY }}
          QA_ANTHROPIC_API_KEY: ${{ secrets.QA_ANTHROPIC_API_KEY }}
          QA_OPENAI_PROVIDER_API_KEY: ${{ secrets.QA_OPENAI_PROVIDER_API_KEY }}
          QA_OPENROUTER_API_KEY: ${{ secrets.QA_OPENROUTER_API_KEY }}
          QA_GEMINI_API_KEY: ${{ secrets.QA_GEMINI_API_KEY }}
          QA_KONGBEIQIE_API_KEY: ${{ secrets.QA_KONGBEIQIE_API_KEY }}
          QA_DEEPSEEK_MODEL: ${{ vars.QA_DEEPSEEK_MODEL }}
          QA_ANTHROPIC_MODEL: ${{ vars.QA_ANTHROPIC_MODEL }}
          QA_OPENAI_MODEL: ${{ vars.QA_OPENAI_MODEL }}
          QA_GEMINI_MODEL: ${{ vars.QA_GEMINI_MODEL }}
          QA_OPENROUTER_CLAUDE_MODEL: ${{ vars.QA_OPENROUTER_CLAUDE_MODEL }}
          QA_OPENROUTER_OPENAI_MODEL: ${{ vars.QA_OPENROUTER_OPENAI_MODEL }}
          QA_OPENROUTER_GLM_MODEL: ${{ vars.QA_OPENROUTER_GLM_MODEL }}
          QA_KONGBEIQIE_MODEL: ${{ vars.QA_KONGBEIQIE_MODEL }}
          QA_KONGBEIQIE_BASE_URL: ${{ vars.QA_KONGBEIQIE_BASE_URL }}
        run: |
          set -euo pipefail
          umask 077
          python qa/provision_profiles.py provision \
            --coverage qa/coverage-lock.json \
            --manifest "${{ steps.context.outputs.manifest }}"

      - name: Split credentials into isolated one-profile manifests
        id: split_manifests
        if: steps.provision.outcome == 'success'
        run: |
          set -euo pipefail
          umask 077
          python qa/split_profile_manifests.py \
            --manifest "${{ steps.context.outputs.manifest }}" \
            --output-dir "${{ steps.context.outputs.profile_manifest_dir }}"

      - name: Verify every profile manifest permission boundary
        id: manifest_isolation
        if: steps.split_manifests.outcome == 'success'
        env:
          CODEX_BIN: ${{ steps.codex_preflight.outputs.codex_bin }}
          QA_CODEX_HOME: ${{ steps.context.outputs.codex_home }}
          QA_PRIVATE_MANIFEST: ${{ steps.context.outputs.manifest }}
          QA_PROFILE_MANIFEST_DIR: ${{ steps.context.outputs.profile_manifest_dir }}
          QA_WORKER_ROOT: ${{ steps.context.outputs.worker_root }}
          QA_WORKER_OUTPUT_ROOT: ${{ steps.context.outputs.worker_output_root }}
          QA_AGGREGATION_INPUT_ROOT: ${{ steps.context.outputs.aggregation_input_root }}
          QA_ORCHESTRATION_RECEIPT: ${{ steps.context.outputs.orchestration_receipt }}
          QA_PRIVATE_RESULT: ${{ steps.context.outputs.private_result }}
          QA_ARTIFACT_DIR: ${{ steps.context.outputs.artifact_dir }}
        run: |
          set -euo pipefail
          profiles=(
            official-deepseek
            official-anthropic
            official-openai
            official-gemini
            openrouter-claude
            openrouter-openai
            openrouter-glm
            relay-kongbeiqie
          )
          agent_types=(
            profile_official_deepseek
            profile_official_anthropic
            profile_official_openai
            profile_official_gemini
            profile_openrouter_claude
            profile_openrouter_openai
            profile_openrouter_glm
            profile_relay_kongbeiqie
          )
          for index in "${!profiles[@]}"; do
            profile_id="${profiles[$index]}"
            agent_type="${agent_types[$index]}"
            own_manifest="${QA_PROFILE_MANIFEST_DIR}/${profile_id}.json"
            own_home="${QA_WORKER_ROOT}/${agent_type}/home"
            own_tmp="${QA_WORKER_ROOT}/${agent_type}/tmp"
            own_work="${QA_WORKER_ROOT}/${agent_type}/work"
            denied_paths=(
              "$QA_PRIVATE_MANIFEST"
              "$QA_WORKER_OUTPUT_ROOT"
              "$QA_AGGREGATION_INPUT_ROOT"
              "$QA_ORCHESTRATION_RECEIPT"
              "$QA_PRIVATE_RESULT"
            )
            for other_profile in "${profiles[@]}"; do
              if [ "$other_profile" != "$profile_id" ]; then
                denied_paths+=("${QA_PROFILE_MANIFEST_DIR}/${other_profile}.json")
              fi
            done

            env -i \
              HOME="$own_home" \
              PATH="$PATH" \
              CODEX_HOME="$QA_CODEX_HOME" \
              LANG="C.UTF-8" \
              TMPDIR="$own_tmp" \
              "$CODEX_BIN" sandbox -P "feedling-e2e-${profile_id}" \
                --include-managed-config -C "$own_work" -- \
                /bin/sh -eu -c '
                  own="$1"
                  own_tmp="$2"
                  own_work="$3"
                  artifact_canary="$4"
                  source_canary="$5"
                  shift 5
                  test -f "$own"
                  test -r "$own"
                  test "$(stat -c "%a" "$own")" = "600"
                  if python -c "import os, sys; fd = os.open(sys.argv[1], os.O_WRONLY | os.O_APPEND); os.close(fd)" "$own" 2>/dev/null; then
                    exit 1
                  fi
                  for denied in "$@"; do
                    test ! -r "$denied"
                  done
                  printf "tmp\n" > "${own_tmp}/.sandbox-canary"
                  rm -f "${own_tmp}/.sandbox-canary"
                  printf "work\n" > "${own_work}/.sandbox-canary"
                  rm -f "${own_work}/.sandbox-canary"
                  if printf "forbidden\n" > "$artifact_canary" 2>/dev/null; then
                    rm -f "$artifact_canary"
                    exit 1
                  fi
                  if printf "forbidden\n" > "$source_canary" 2>/dev/null; then
                    rm -f "$source_canary"
                    exit 1
                  fi
                ' sh \
                "$own_manifest" \
                "$own_tmp" \
                "$own_work" \
                "${QA_ARTIFACT_DIR}/.worker-write-must-fail" \
                "$GITHUB_WORKSPACE/qa/.source-write-must-fail" \
                "${denied_paths[@]}"
          done

      - name: Run eight independent headless Codex profile agents
        id: profile_workers
        if: steps.manifest_isolation.outcome == 'success'
        timeout-minutes: 140
        env:
          QA_CODEX_HOME: ${{ steps.context.outputs.codex_home }}
          QA_ARTIFACT_DIR: ${{ steps.context.outputs.artifact_dir }}
          QA_PROFILE_MANIFEST_DIR: ${{ steps.context.outputs.profile_manifest_dir }}
          QA_WORKER_ROOT: ${{ steps.context.outputs.worker_root }}
          QA_WORKER_OUTPUT_ROOT: ${{ steps.context.outputs.worker_output_root }}
          QA_AGGREGATION_INPUT_ROOT: ${{ steps.context.outputs.aggregation_input_root }}
          QA_ORCHESTRATION_RECEIPT: ${{ steps.context.outputs.orchestration_receipt }}
          QA_RUN_ID: ${{ steps.context.outputs.run_id }}
          QA_EXPECTED_DEPLOYMENT_SHA: ${{ steps.context.outputs.expected_sha }}
        run: |
          set -euo pipefail
          umask 077
          python qa/run_codex_profile_workers.py \
            --codex-bin "$(command -v codex)" \
            --codex-home "$QA_CODEX_HOME" \
            --source-root "$GITHUB_WORKSPACE" \
            --artifact-root "$QA_ARTIFACT_DIR" \
            --profile-manifest-dir "$QA_PROFILE_MANIFEST_DIR" \
            --worker-root "$QA_WORKER_ROOT" \
            --worker-output-root "$QA_WORKER_OUTPUT_ROOT" \
            --aggregation-input-root "$QA_AGGREGATION_INPUT_ROOT" \
            --authoring-schema "$GITHUB_WORKSPACE/qa/schemas/codex-run-result.schema.json" \
            --receipt "$QA_ORCHESTRATION_RECEIPT" \
            --run-id "$QA_RUN_ID" \
            --base-url https://test-api.feedling.app \
            --expected-sha "$QA_EXPECTED_DEPLOYMENT_SHA" \
            --timeout-seconds 2400

      - name: Verify independent Codex worker lifecycle and canonical inputs
        id: orchestration
        if: steps.profile_workers.outcome == 'success'
        run: |
          set -euo pipefail
          python qa/verify_codex_orchestration.py \
            --receipt "${{ steps.context.outputs.orchestration_receipt }}" \
            --worker-output-root "${{ steps.context.outputs.worker_output_root }}" \
            --aggregation-input-root "${{ steps.context.outputs.aggregation_input_root }}"

      - name: Verify deployment identity remained stable after profile testing
        id: deployment_post
        if: steps.orchestration.outcome == 'success'
        env:
          QA_FEEDLING_BASE_URL: https://test-api.feedling.app
          QA_TEST_ADMIN_TOKEN: ${{ secrets.QA_TEST_ADMIN_TOKEN }}
          QA_EXPECTED_DEPLOYMENT_SHA: ${{ steps.context.outputs.expected_sha }}
        run: |
          set -euo pipefail
          umask 077
          python qa/verify_deployment.py \
            --expected-sha "$QA_EXPECTED_DEPLOYMENT_SHA" \
            --receipt "${{ steps.context.outputs.post_deployment_receipt }}"

      - name: Run intelligent Codex qualification aggregator
        id: supervisor
        if: steps.deployment_post.outcome == 'success'
        timeout-minutes: 20
        env:
          CODEX_BIN: ${{ steps.codex_preflight.outputs.codex_bin }}
          QA_CODEX_HOME: ${{ steps.context.outputs.codex_home }}
          QA_SUPERVISOR_HOME: ${{ steps.context.outputs.supervisor_home }}
          QA_SUPERVISOR_TMP: ${{ steps.context.outputs.supervisor_tmp }}
          QA_SUPERVISOR_WORK: ${{ steps.context.outputs.supervisor_work }}
          QA_AGGREGATION_INPUT_ROOT: ${{ steps.context.outputs.aggregation_input_root }}
          QA_ORCHESTRATION_RECEIPT: ${{ steps.context.outputs.orchestration_receipt }}
          QA_PRIVATE_ROOT: ${{ steps.context.outputs.private_root }}
          QA_PRIVATE_RESULT: ${{ steps.context.outputs.private_result }}
          QA_RUN_ID: ${{ steps.context.outputs.run_id }}
          QA_EXPECTED_DEPLOYMENT_SHA: ${{ steps.context.outputs.expected_sha }}
        run: |
          set -euo pipefail
          umask 077
          prompt_file="${QA_PRIVATE_ROOT}/aggregation-prompt.txt"
          raw_stdout="${QA_PRIVATE_ROOT}/raw-codex/aggregation-events.jsonl"
          raw_stderr="${QA_PRIVATE_ROOT}/raw-codex/aggregation-stderr.log"
          cat > "$prompt_file" <<PROMPT
          Act as the final intelligent Feedling API-key qualification supervisor.

          Read and obey ${GITHUB_WORKSPACE}/qa/SOP.md,
          ${GITHUB_WORKSPACE}/qa/coverage-lock.json, and
          ${GITHUB_WORKSPACE}/qa/scenarios/api-key-journey.md. Trusted code has
          already run exactly eight independent profile agents in three fixed
          batches (3+3+2), with a concurrency cap of three. Read only the eight
          schema-validated profile JSON files in
          ${QA_AGGREGATION_INPUT_ROOT} and the trusted lifecycle receipt at
          ${QA_ORCHESTRATION_RECEIPT}. Never read raw worker events/stderr,
          provisioning manifests, credentials, or public artifacts; never run
          another product probe or launch another agent.

          Copy all eight profile objects exactly, in locked matrix order. Do not
          weaken or rewrite any failed assertion, retry observation, persona
          finalizer receipt or qualification-agent semantic judgment,
          reasoning/COT evidence, trace correlation, per-turn five-stage latency,
          or cleanup result. Build the canonical run object for run
          ${QA_RUN_ID}. Trusted pre/post deployment checks proved that backend
          and every live worker remained at SHA ${QA_EXPECTED_DEPLOYMENT_SHA};
          set expected and observed backend/worker SHA to that exact value,
          environment test, base URL https://test-api.feedling.app, and runtime
          db_action_v2.

          Set supervisor_count=1, configured concurrency=3, observed concurrency
          and each profile/worker assignment exactly from the trusted receipt.
          profiles_expected and profiles_completed are both 8. Compute the seven
          summary counts from the exact profile statuses; they must sum to eight.
          Compute overall_status from those statuses without turning a blocked
          or failed profile into PASS. Use the earliest scenario start and latest
          scenario finish as run timestamps. Use only the schema-fixed artifact
          references and redaction booleans. Return only canonical JSON matching
          the supplied schema.
          PROMPT

          env -i \
            HOME="$QA_SUPERVISOR_HOME" \
            PATH="$PATH" \
            CODEX_HOME="$QA_CODEX_HOME" \
            LANG="C.UTF-8" \
            TMPDIR="$QA_SUPERVISOR_TMP" \
            PYTHONDONTWRITEBYTECODE="1" \
            PYTHONPATH="$GITHUB_WORKSPACE" \
            QA_SOURCE_ROOT="$GITHUB_WORKSPACE" \
            QA_RUN_ID="$QA_RUN_ID" \
            QA_AGGREGATION_INPUT_ROOT="$QA_AGGREGATION_INPUT_ROOT" \
            QA_ORCHESTRATION_RECEIPT="$QA_ORCHESTRATION_RECEIPT" \
            QA_EXPECTED_DEPLOYMENT_SHA="$QA_EXPECTED_DEPLOYMENT_SHA" \
            QA_EXPECTED_RUNTIME="db_action_v2" \
            QA_FEEDLING_BASE_URL="https://test-api.feedling.app" \
            "$CODEX_BIN" exec \
              --ignore-rules \
              --strict-config \
              --disable multi_agent \
              --disable network_proxy \
              --skip-git-repo-check \
              --cd "$QA_SUPERVISOR_WORK" \
              --output-schema "$GITHUB_WORKSPACE/qa/schemas/codex-run-result.schema.json" \
              --output-last-message "$QA_PRIVATE_RESULT" \
              --color never \
              --json - \
              < "$prompt_file" > "$raw_stdout" 2> "$raw_stderr"

      - name: Publish canonical result without following agent-created links
        id: publish_result
        if: steps.supervisor.outcome == 'success'
        run: |
          set -euo pipefail
          python qa/publish_agent_result.py \
            --source "${{ steps.context.outputs.private_result }}" \
            --destination "${{ steps.context.outputs.artifact_dir }}/run-result.json"

      - name: Render trusted derived artifacts
        id: render
        if: steps.publish_result.outcome == 'success'
        env:
          QA_ARTIFACT_DIR: ${{ steps.context.outputs.artifact_dir }}
        run: |
          set -euo pipefail
          python qa/render_artifacts.py \
            --schema qa/schemas/run-result.schema.json \
            --result "$QA_ARTIFACT_DIR/run-result.json" \
            --artifacts "$QA_ARTIFACT_DIR"

      - name: Validate complete release result
        id: validate
        if: always()
        env:
          QA_ARTIFACT_DIR: ${{ steps.context.outputs.artifact_dir }}
          QA_EXPECTED_DEPLOYMENT_SHA: ${{ steps.context.outputs.expected_sha }}
        run: |
          set -euo pipefail
          python qa/validate_run.py \
            --coverage qa/coverage-lock.json \
            --schema qa/schemas/run-result.schema.json \
            --result "$QA_ARTIFACT_DIR/run-result.json" \
            --artifacts "$QA_ARTIFACT_DIR" \
            --provisioning-manifest "${{ steps.context.outputs.manifest }}" \
            --orchestration-receipt "${{ steps.context.outputs.orchestration_receipt }}" \
            --deployment-receipt "${{ steps.context.outputs.pre_deployment_receipt }}" \
            --post-deployment-receipt "${{ steps.context.outputs.post_deployment_receipt }}" \
            --expected-runtime db_action_v2 \
            --expected-sha "$QA_EXPECTED_DEPLOYMENT_SHA"

      - name: Scan public artifacts for secrets and raw evidence
        id: secret_scan
        if: always()
        env:
          QA_ARTIFACT_DIR: ${{ steps.context.outputs.artifact_dir }}
          QA_PRIVATE_MANIFEST: ${{ steps.context.outputs.manifest }}
          QA_TEST_ADMIN_TOKEN: ${{ secrets.QA_TEST_ADMIN_TOKEN }}
          QA_DEEPSEEK_API_KEY: ${{ secrets.QA_DEEPSEEK_API_KEY }}
          QA_ANTHROPIC_API_KEY: ${{ secrets.QA_ANTHROPIC_API_KEY }}
          QA_OPENAI_PROVIDER_API_KEY: ${{ secrets.QA_OPENAI_PROVIDER_API_KEY }}
          QA_OPENROUTER_API_KEY: ${{ secrets.QA_OPENROUTER_API_KEY }}
          QA_GEMINI_API_KEY: ${{ secrets.QA_GEMINI_API_KEY }}
          QA_KONGBEIQIE_API_KEY: ${{ secrets.QA_KONGBEIQIE_API_KEY }}
          QA_CODEX_AUTH_JSON_B64: ${{ secrets.QA_CODEX_AUTH_JSON_B64 }}
        run: |
          set -euo pipefail
          python qa/scan_artifacts.py \
            --artifacts "$QA_ARTIFACT_DIR" \
            --manifest "$QA_PRIVATE_MANIFEST" \
            --codex-auth "${{ steps.codex_preflight.outputs.codex_auth }}" \
            --fixture qa/fixtures/persona-import-v1.json

      - name: Cleanup every synthetic account
        id: cleanup
        if: always()
        env:
          QA_TEST_ADMIN_TOKEN: ${{ secrets.QA_TEST_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          python qa/provision_profiles.py cleanup \
            --manifest "${{ steps.context.outputs.manifest }}"

      - name: Upload sanitized public qualification artifacts
        id: upload
        if: always() && steps.secret_scan.outcome == 'success' && steps.cleanup.outcome == 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: feedling-api-key-e2e-${{ steps.context.outputs.run_id }}
          path: ${{ steps.context.outputs.artifact_dir }}
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 14
          compression-level: 6

      - name: Remove public scratch after upload decision
        id: public_cleanup
        if: always()
        env:
          QA_ARTIFACT_DIR: ${{ steps.context.outputs.artifact_dir }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import shutil
          import sys
          from pathlib import Path

          raw = os.environ.get("QA_ARTIFACT_DIR", "")
          if not raw:
              raise SystemExit(0)
          root = Path(raw).absolute()
          expected_parent = (
              Path(os.environ["GITHUB_WORKSPACE"]) / "qualification-artifacts"
          ).resolve()
          if root.parent.resolve() != expected_parent or not root.name.startswith(
              "api-key-e2e-"
          ):
              print("::error::refusing unsafe public scratch cleanup path", file=sys.stderr)
              raise SystemExit(1)
          if root.is_symlink():
              root.unlink()
          elif root.exists():
              shutil.rmtree(root)
          print("public qualification scratch removed")
          PY

      - name: Remove private scratch after account cleanup
        id: private_cleanup
        if: always()
        env:
          CLEANUP_OUTCOME: ${{ steps.cleanup.outcome }}
          QA_PRIVATE_ROOT: ${{ steps.context.outputs.private_root }}
          QA_PRIVATE_MANIFEST: ${{ steps.context.outputs.manifest }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import shutil
          import sys
          from pathlib import Path

          raw = os.environ.get("QA_PRIVATE_ROOT", "")
          if not raw:
              raise SystemExit(0)
          root = Path(raw).absolute()
          runner_temp = Path(os.environ["RUNNER_TEMP"]).resolve()
          if root.parent.resolve() != runner_temp or not root.name.startswith(
              "api-key-e2e-"
          ):
              print("::error::refusing unsafe private scratch cleanup path", file=sys.stderr)
              raise SystemExit(1)

          if os.environ.get("CLEANUP_OUTCOME") == "success":
              if root.is_symlink():
                  root.unlink()
              elif root.exists():
                  shutil.rmtree(root)
              print("private qualification scratch removed")
              raise SystemExit(0)

          manifest = Path(os.environ.get("QA_PRIVATE_MANIFEST", "")).absolute()
          if root.exists() and not root.is_symlink():
              for child in root.iterdir():
                  if child == manifest and child.is_file() and not child.is_symlink():
                      child.chmod(0o600)
                  elif child.is_dir() and not child.is_symlink():
                      shutil.rmtree(child)
                  else:
                      child.unlink(missing_ok=True)
          print(
              "::warning::account cleanup failed; retained only a 0600 private manifest for operator retry"
          )
          PY

      - name: Enforce fail-closed qualification outcome
        if: always()
        env:
          CODEX_PREFLIGHT: ${{ steps.codex_preflight.outcome }}
          DEPLOYMENT_PRE: ${{ steps.deployment_pre.outcome }}
          DEPLOYMENT_POST: ${{ steps.deployment_post.outcome }}
          PROVISION: ${{ steps.provision.outcome }}
          SPLIT_MANIFESTS: ${{ steps.split_manifests.outcome }}
          MANIFEST_ISOLATION: ${{ steps.manifest_isolation.outcome }}
          PROFILE_WORKERS: ${{ steps.profile_workers.outcome }}
          ORCHESTRATION: ${{ steps.orchestration.outcome }}
          SUPERVISOR: ${{ steps.supervisor.outcome }}
          PUBLISH_RESULT: ${{ steps.publish_result.outcome }}
          RENDER: ${{ steps.render.outcome }}
          VALIDATE: ${{ steps.validate.outcome }}
          SECRET_SCAN: ${{ steps.secret_scan.outcome }}
          CLEANUP: ${{ steps.cleanup.outcome }}
          UPLOAD: ${{ steps.upload.outcome }}
          PUBLIC_CLEANUP: ${{ steps.public_cleanup.outcome }}
          PRIVATE_CLEANUP: ${{ steps.private_cleanup.outcome }}
        run: |
          set -euo pipefail
          failed=0
          for item in \
            "codex-preflight:$CODEX_PREFLIGHT" \
            "deployment-pre:$DEPLOYMENT_PRE" \
            "deployment-post:$DEPLOYMENT_POST" \
            "provision:$PROVISION" \
            "split-manifests:$SPLIT_MANIFESTS" \
            "manifest-isolation:$MANIFEST_ISOLATION" \
            "profile-workers:$PROFILE_WORKERS" \
            "orchestration:$ORCHESTRATION" \
            "supervisor:$SUPERVISOR" \
            "publish-result:$PUBLISH_RESULT" \
            "render:$RENDER" \
            "validate:$VALIDATE" \
            "secret-scan:$SECRET_SCAN" \
            "cleanup:$CLEANUP" \
            "upload:$UPLOAD" \
            "public-cleanup:$PUBLIC_CLEANUP" \
            "private-cleanup:$PRIVATE_CLEANUP"
          do
            name="${item%%:*}"
            outcome="${item#*:}"
            if [ "$outcome" != "success" ]; then
              echo "::error::$name outcome was $outcome"
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            echo "release qualification: FAIL"
            exit 1
          fi
          echo "release qualification: PASS"
