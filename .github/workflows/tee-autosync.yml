# .github/workflows/tee-autosync.yml — TEE 影子库无人值守自动同步
#
# 双写(mirror)只自动搬「明文表的新写入」;存量 + 密文表(chat/memory/identity/
# world_book/frames,经 enclave 解密成明文)不会自己进影子库。本 workflow 定时
# 打 app CVM 的 admin 端点把它们也同步进来,达到「设完即忘」的自动同步。
#
# 触发:
#   - 每 15 分钟:增量 replicate 全部密文表(游标扫描,无新行时是空 SELECT,极廉价)。
#   - 每日 03:17 UTC:全量 reconcile(明文表漂移补偿)+ verify(对账观测)。
#   - workflow_dispatch:手动全量跑一次。
#
# 幂等/安全:
#   - replicate/reconcile 非 dry-run 需 confirm=MIGRATE,这里硬编码(自动化显式授权写)。
#   - 端点有单run锁:并发调用得 409;本 workflow concurrency 组 + 409 当「跳过」不算败。
#   - 双写还没部署时端点返回 503(TEE 未配置)→ 同样当「跳过」,workflow 不红,
#     等 app CVM 带 TEE_DATABASE_URL 部署后自动开始真同步。
#   - ⚠️ GitHub 的 schedule 只从仓库默认分支触发;合入默认分支前只有 workflow_dispatch 可用。
name: TEE auto-sync
on:
  schedule:
    - cron: '*/15 * * * *'   # 增量 replicate 密文表
    - cron: '17 3 * * *'     # 每日全量 reconcile + verify
  workflow_dispatch: {}
concurrency: tee-replication  # 与手动 tee-replicate.yml 互斥,防两次复制并发
permissions:
  contents: read
jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      BASE_URL: https://test-api.feedling.app
      ADMIN_KEY: ${{ secrets.FEEDLING_ADMIN_TOKEN }}
    steps:
      - name: Incremental replicate — ciphertext tables (每次触发都跑)
        run: |
          set -uo pipefail
          call() {  # $1=json body;2xx=成功,409/503=跳过,其余=失败
            code=$(curl -sS -o /tmp/resp.json -w '%{http_code}' \
              -X POST "$BASE_URL/v1/admin/tee-replication/run" \
              -H 'content-type: application/json' -H "X-Admin-Token: $ADMIN_KEY" -d "$1")
            echo "  HTTP $code"; jq . /tmp/resp.json 2>/dev/null || cat /tmp/resp.json; echo
            case "$code" in
              2*) return 0 ;;
              409) echo "  (skip: 另一次 run 在跑)"; return 0 ;;
              503) echo "  (skip: TEE 未配置 — app CVM 还没带 TEE_DATABASE_URL 部署)"; return 0 ;;
              *)   echo "::error::replicate 失败 HTTP $code"; return 1 ;;
            esac
          }
          for t in chat_messages memory_moments world_book_entries identity frame_envelopes; do
            echo "== replicate $t =="
            call "{\"action\":\"replicate\",\"table\":\"$t\",\"dry_run\":false,\"confirm\":\"MIGRATE\"}" || exit 1
          done

      - name: Daily full reconcile + verify (仅每日 cron)
        if: github.event.schedule == '17 3 * * *'
        run: |
          set -uo pipefail
          call() {
            code=$(curl -sS -o /tmp/resp.json -w '%{http_code}' \
              -X POST "$BASE_URL/v1/admin/tee-replication/run" \
              -H 'content-type: application/json' -H "X-Admin-Token: $ADMIN_KEY" -d "$1")
            echo "  HTTP $code"; jq . /tmp/resp.json 2>/dev/null || cat /tmp/resp.json; echo
            case "$code" in 2*) return 0 ;; 409|503) echo "  (skip $code)"; return 0 ;; *) echo "::error::HTTP $code"; return 1 ;; esac
          }
          echo "== reconcile 全部明文表 =="
          call '{"action":"reconcile","dry_run":false,"confirm":"MIGRATE"}' || exit 1
          echo "== verify(只读对账)=="
          call '{"action":"verify","dry_run":false}' || exit 1
