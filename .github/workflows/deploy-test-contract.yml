name: Deploy test FeedlingAppAuth (manual)

# One-off, manually-triggered deploy of a SEPARATE FeedlingAppAuth contract
# on Sepolia for the test environment. Reuses the existing throwaway deployer
# key (secret ETH_DEPLOYER_KEY) so the new contract's owner == that key's
# address — which is REQUIRED, because the test-branch CI publish step calls
# addComposeHash() with the same key and addComposeHash is onlyOwner.
#
# After it runs: copy the printed address into repo variable
# TEST_FEEDLING_APP_AUTH_CONTRACT (see the run summary for the exact command).
#
# Trigger: Actions tab → "Deploy test FeedlingAppAuth (manual)" → Run workflow.

on:
  workflow_dispatch:

jobs:
  deploy-test-contract:
    name: deploy FeedlingAppAuth to Sepolia (test)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: forge build
        run: forge build

      - name: Deploy FeedlingAppAuth
        env:
          # Owner is intentionally NOT set → defaults to the deployer address
          # (vm.addr(PRIVATE_KEY)), i.e. the ETH_DEPLOYER_KEY address. This is
          # what lets the test-branch CI publish step call addComposeHash().
          PRIVATE_KEY:         ${{ secrets.ETH_DEPLOYER_KEY }}
          ETH_SEPOLIA_RPC_URL: ${{ vars.ETH_SEPOLIA_RPC_URL }}
        run: |
          forge script script/DeployFeedlingAppAuth.s.sol \
            --rpc-url "$ETH_SEPOLIA_RPC_URL" \
            --private-key "$PRIVATE_KEY" \
            --broadcast

      - name: Extract deployed address + owner
        id: addr
        run: |
          RUN_JSON="broadcast/DeployFeedlingAppAuth.s.sol/11155111/run-latest.json"
          if [ ! -f "$RUN_JSON" ]; then
            echo "::error::broadcast artifact not found at $RUN_JSON — deploy likely failed"
            exit 1
          fi
          ADDR=$(jq -r '.transactions[] | select(.contractName=="FeedlingAppAuth") | .contractAddress' "$RUN_JSON" | head -1)
          if [ -z "$ADDR" ] || [ "$ADDR" = "null" ]; then
            echo "::error::could not parse FeedlingAppAuth address from $RUN_JSON"
            exit 1
          fi
          # Confirm on-chain owner == the deployer address (sanity check).
          DEPLOYER=$(cast wallet address --private-key "${{ secrets.ETH_DEPLOYER_KEY }}")
          OWNER=$(cast call "$ADDR" "owner()(address)" --rpc-url "${{ vars.ETH_SEPOLIA_RPC_URL }}")
          echo "addr=$ADDR" >> "$GITHUB_OUTPUT"
          {
            echo "## Test FeedlingAppAuth deployed ✅"
            echo ""
            echo "| field | value |"
            echo "|---|---|"
            echo "| contract | \`$ADDR\` |"
            echo "| owner | \`$OWNER\` |"
            echo "| deployer (ETH_DEPLOYER_KEY) | \`$DEPLOYER\` |"
            echo "| explorer | https://sepolia.etherscan.io/address/$ADDR |"
            echo ""
            if [ "$(echo "$OWNER" | tr 'A-Z' 'a-z')" = "$(echo "$DEPLOYER" | tr 'A-Z' 'a-z')" ]; then
              echo "> ✅ owner == deployer — CI \`addComposeHash\` will work."
            else
              echo "> ⚠️ owner != deployer — CI publish would revert. Redeploy without FEEDLING_APP_AUTH_OWNER set."
            fi
            echo ""
            echo "### Next step"
            echo "Set the repo variable so the test deploy job can target this contract:"
            echo '```bash'
            echo "gh variable set TEST_FEEDLING_APP_AUTH_CONTRACT --body $ADDR"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo ">>> FeedlingAppAuth (test) deployed at: $ADDR (owner: $OWNER)"
