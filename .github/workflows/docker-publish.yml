name: Publish container image

on:
  push:
    branches: [main, test]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: build + push ghcr.io/${{ github.repository_owner }}/feedling
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    outputs:
      image_tags: ${{ steps.tags.outputs.tags }}
      agent_runner_tags: ${{ steps.tags.outputs.ar_tags }}
      git_commit: ${{ steps.meta.outputs.git_commit }}
      built_at: ${{ steps.meta.outputs.built_at }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: tags
        run: |
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          IMAGE=ghcr.io/${{ github.repository_owner }}/feedling
          # lowercase owner to satisfy ghcr's naming rules
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          # the agent-runner (4th CVM service) ships as a sibling image built from
          # deploy/Dockerfile.agent-runner, tagged with the same commit sha.
          AR_IMAGE="${IMAGE}-agent-runner"
          echo "ar_image=$AR_IMAGE" >> "$GITHUB_OUTPUT"
          # :latest only tracks main; test (and other branches) only get :<sha>
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            echo "tags=$IMAGE:$COMMIT_SHORT,$IMAGE:latest" >> "$GITHUB_OUTPUT"
            echo "ar_tags=$AR_IMAGE:$COMMIT_SHORT,$AR_IMAGE:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=$IMAGE:$COMMIT_SHORT" >> "$GITHUB_OUTPUT"
            echo "ar_tags=$AR_IMAGE:$COMMIT_SHORT" >> "$GITHUB_OUTPUT"
          fi

      - name: Derive release metadata
        id: meta
        run: |
          echo "git_commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            FEEDLING_GIT_COMMIT=${{ steps.meta.outputs.git_commit }}
            FEEDLING_BUILT_AT=${{ steps.meta.outputs.built_at }}

      - name: Build + push agent-runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.agent-runner
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.ar_tags }}
          build-args: |
            FEEDLING_GIT_COMMIT=${{ steps.meta.outputs.git_commit }}

      - name: Capture image digest
        run: |
          echo "Published: ${{ steps.tags.outputs.tags }}"
          echo "Published: ${{ steps.tags.outputs.ar_tags }}"
          echo "Digest tracked in run logs; pin from the docker.build output above."

      # Auto-publish the container package so anyone (including Phala CVMs)
      # can pull without a token. Required for reproducible-build
      # verification — if the image is private, third parties can't
      # recompute the compose_hash.
      - name: Set package visibility to public
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          # org-owned path
          gh api --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/orgs/${{ github.repository_owner }}/packages/container/feedling" \
            -f visibility=public 2>&1 | tail -5 || true
          # user-owned fallback
          gh api --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/user/packages/container/feedling" \
            -f visibility=public 2>&1 | tail -5 || true
          # agent-runner image — same public-visibility requirement (CVM pull +
          # reproducible-build verification).
          gh api --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/orgs/${{ github.repository_owner }}/packages/container/feedling-agent-runner" \
            -f visibility=public 2>&1 | tail -5 || true
          gh api --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/user/packages/container/feedling-agent-runner" \
            -f visibility=public 2>&1 | tail -5 || true

  notify-lark:
    name: notify Lark bot
    runs-on: ubuntu-24.04
    needs: build-and-push
    if: always() && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    env:
      LARK_BOT_WEBHOOK: ${{ secrets.LARK_BOT_WEBHOOK }}
      LARK_BOT_SECRET: ${{ secrets.LARK_BOT_SECRET }}
    steps:
      - name: Skip when LARK_BOT_WEBHOOK is not configured
        if: env.LARK_BOT_WEBHOOK == ''
        run: echo "LARK_BOT_WEBHOOK is not configured; skip Lark notification."

      - name: Send publish result to Lark
        if: env.LARK_BOT_WEBHOOK != ''
        continue-on-error: true
        env:
          RESULT: ${{ needs.build-and-push.result }}
          IMAGE_TAGS: ${{ needs.build-and-push.outputs.image_tags }}
          AGENT_RUNNER_TAGS: ${{ needs.build-and-push.outputs.agent_runner_tags }}
          GIT_COMMIT: ${{ needs.build-and-push.outputs.git_commit }}
          BUILT_AT: ${{ needs.build-and-push.outputs.built_at }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          ACTOR: ${{ github.actor }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          if [ "$RESULT" = "success" ]; then
            PREFIX="✅"
            STATUS="success"
          else
            PREFIX="❌"
            STATUS="$RESULT"
          fi

          RUN_URL="${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}"
          COMMIT_URL="${SERVER_URL}/${REPOSITORY}/commit/${SHA}"
          SHORT_SHA="${SHA:0:7}"
          IMAGE_TAGS="${IMAGE_TAGS:-n/a}"
          AGENT_RUNNER_TAGS="${AGENT_RUNNER_TAGS:-n/a}"
          GIT_COMMIT="${GIT_COMMIT:-$SHA}"
          BUILT_AT="${BUILT_AT:-n/a}"

          CONTENT=$(cat <<EOF
          $PREFIX Feedling MCP image publish: $STATUS

          repo: $REPOSITORY
          ref: $REF_TYPE/$REF_NAME
          actor: $ACTOR
          commit: $SHORT_SHA
          built_at: $BUILT_AT

          image: $IMAGE_TAGS
          agent-runner: $AGENT_RUNNER_TAGS

          actions: $RUN_URL
          commit: $COMMIT_URL
          full_sha: $GIT_COMMIT
          EOF
          )

          SIGN_TS=""
          SIGN=""
          if [ -n "$LARK_BOT_SECRET" ]; then
            SIGN_TS=$(date +%s)
            export SIGN_TS LARK_BOT_SECRET
            SIGN=$(python3 - <<'PY'
          import base64
          import hashlib
          import hmac
          import os

          string_to_sign = f"{os.environ['SIGN_TS']}\n{os.environ['LARK_BOT_SECRET']}".encode("utf-8")
          print(base64.b64encode(hmac.new(string_to_sign, digestmod=hashlib.sha256).digest()).decode("utf-8"))
          PY
          )
          fi

          jq -n \
            --arg content "$CONTENT" \
            --arg timestamp "$SIGN_TS" \
            --arg sign "$SIGN" \
            'if $timestamp == "" then
               {msg_type:"text", content:{text:$content}}
             else
               {timestamp:$timestamp, sign:$sign, msg_type:"text", content:{text:$content}}
             end' \
            | curl -fsS -X POST "$LARK_BOT_WEBHOOK" \
                -H "Content-Type: application/json" \
                --data-binary @-
