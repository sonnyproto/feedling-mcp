name: Publish container image

on:
  push:
    branches: [main, test]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: build + push ghcr.io/${{ github.repository_owner }}/feedling
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: tags
        run: |
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          IMAGE=ghcr.io/${{ github.repository_owner }}/feedling
          # lowercase owner to satisfy ghcr's naming rules
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          # the agent-runner (4th CVM service) ships as a sibling image built from
          # deploy/Dockerfile.agent-runner, tagged with the same commit sha.
          AR_IMAGE="${IMAGE}-agent-runner"
          echo "ar_image=$AR_IMAGE" >> "$GITHUB_OUTPUT"
          # :latest only tracks main; test (and other branches) only get :<sha>
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            echo "tags=$IMAGE:$COMMIT_SHORT,$IMAGE:latest" >> "$GITHUB_OUTPUT"
            echo "ar_tags=$AR_IMAGE:$COMMIT_SHORT,$AR_IMAGE:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=$IMAGE:$COMMIT_SHORT" >> "$GITHUB_OUTPUT"
            echo "ar_tags=$AR_IMAGE:$COMMIT_SHORT" >> "$GITHUB_OUTPUT"
          fi

      - name: Derive release metadata
        id: meta
        run: |
          echo "git_commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            FEEDLING_GIT_COMMIT=${{ steps.meta.outputs.git_commit }}
            FEEDLING_BUILT_AT=${{ steps.meta.outputs.built_at }}

      - name: Build + push agent-runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.agent-runner
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.ar_tags }}
          build-args: |
            FEEDLING_GIT_COMMIT=${{ steps.meta.outputs.git_commit }}

      - name: Capture image digest
        run: |
          echo "Published: ${{ steps.tags.outputs.tags }}"
          echo "Published: ${{ steps.tags.outputs.ar_tags }}"
          echo "Digest tracked in run logs; pin from the docker.build output above."

      # Auto-publish the container package so anyone (including Phala CVMs)
      # can pull without a token. Required for reproducible-build
      # verification — if the image is private, third parties can't
      # recompute the compose_hash.
      - name: Set package visibility to public
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          # org-owned path
          gh api --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/orgs/${{ github.repository_owner }}/packages/container/feedling" \
            -f visibility=public 2>&1 | tail -5 || true
          # user-owned fallback
          gh api --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/user/packages/container/feedling" \
            -f visibility=public 2>&1 | tail -5 || true
          # agent-runner image — same public-visibility requirement (CVM pull +
          # reproducible-build verification).
          gh api --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/orgs/${{ github.repository_owner }}/packages/container/feedling-agent-runner" \
            -f visibility=public 2>&1 | tail -5 || true
          gh api --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/user/packages/container/feedling-agent-runner" \
            -f visibility=public 2>&1 | tail -5 || true
