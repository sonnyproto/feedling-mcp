# §4 day-0 decrypt continuity canary (PROD).
#
# Proves the live PROD enclave can still open an OLD envelope — the exact question
# the 2026-07 "decrypt failed" false alarm raised, which the §3 deploy canary
# (new writes only) cannot answer. Reads the permanent canary user's OLDEST stored
# chat envelope from the prod DB and decrypts it through the prod enclave. Green
# during a "decrypt failed" report instantly reframes triage to "client-side".
#
# Runs daily + on demand. INERT until the repo var CANARY_USER_ID is set, so
# merging it is a no-op until you opt in.
name: continuity-canary

on:
  schedule:
    - cron: "17 6 * * *"   # daily ~06:17 UTC
  workflow_dispatch: {}

concurrency:
  group: continuity-canary
  cancel-in-progress: false

jobs:
  prod-continuity:
    name: prod day-0 decrypt continuity
    runs-on: ubuntu-latest
    if: ${{ vars.CANARY_USER_ID != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: python3 -m pip install --quiet "psycopg[binary]>=3.2"
      - name: Decrypt the aging canary envelope
        env:
          CANARY_USER_ID:               ${{ vars.CANARY_USER_ID }}
          DATABASE_URL:                 ${{ secrets.DATABASE_URL }}
          FEEDLING_RUNTIME_TOKEN_SECRET: ${{ secrets.FEEDLING_RUNTIME_TOKEN_SECRET }}
          FEEDLING_ENCLAVE_URL:         ${{ vars.PROD_MAIN_ENCLAVE_URL }}
        run: python3 tools/continuity_canary.py
